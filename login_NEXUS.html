<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculdade NEXUS</title>
    <link rel="icon" type="image/png" sizes="60x60px" href="iconnexus.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col"></div>
            <div class="col-sm-12 col-md-6 col-lg-3 pagina">
                <form class="container" style="font-family: Montserrat;">
                    <h2>Welcome Home</h2>
                    <p>Login to continue</p>
                    <div class="mb-3 username">
                        <input class="form-control" type="text" placeholder="Username"
                            aria-label="default input example">
                    </div>
                    <div class=" mb-3">
                        <input class="form-control" type="password" placeholder="Password"
                            aria-label="default input example">
                    </div>

                    <button type="submit" class="btn login" onclick="abrirAlerta(event)">Submit</button>
                </form>
            </div>
            <div class="col"></div>


        </div>

    </div>

    <script>
        function abrirAlerta(event) {
            event.preventDefault(); // 🚫 impede o recarregamento

            Swal.fire({
                title: "Seja Bem-Vindo!",
                icon: "success",
                confirmButtonText: "OK",
                customClass: {
                    title: 'meuTitulo'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "menu_nexus.html";
                }
            });
        }
    </script>

</body>

</html>
