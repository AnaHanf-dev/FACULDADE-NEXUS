<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculdade NEXUS</title>
    <link rel="icon" type="image/png" sizes="60x60px" href="iconnexus.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="signin.css">
    <script src="signin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col"></div>
            <div class="col-sm-12 col-md-11 col-lg-10 pagina">
                <form class="container" style="font-family: Montserrat;">
                    <h2>Welcome Home</h2>
                    <p>Sing up to continue</p>
                    <div class="">
                        <input type="text" class="form-control" id="nome" aria-describedby="emailHelp" placeholder="Nome Completo">
                    </div>
                    <div class="col-12">
                        <input type="text" class="form-control" id="endereço" placeholder="Endereço">
                    </div>

                    <div class="row">
                        <div class="col-sm-7">
                            <input type="text" class="form-control" id="cidade"
                                aria-describedby="emailHelp" placeholder="Cidade">
                        </div>
                        <div class="col-sm">
                            <input type="text" class="form-control" id="estado"
                                aria-describedby="emailHelp" placeholder="Estado">
                        </div>
                        <div class="col-sm">
                            <input type="number" class="form-control" id="cep"
                                aria-describedby="emailHelp" placeholder="CEP">
                        </div>

                        <div class="col-12">
                            <input type="email" class="form-control" id="email" placeholder="Endereço de Email">
                        </div>

                        <div class="">
                            <input type="text" class="form-control" id="username" placeholder="Username">
                        </div>
                        <div class=""></div>
                            <input type="password" class="form-control" id="password" placeholder="Password">
                        </div>

                        <button type="submit" class="btn login mt-3" onclick="abrirAlerta(event)">Sign Up</button>
                </form>
            </div>
            <div class="col"></div>


        </div>

    </div>

</body>

</html>
